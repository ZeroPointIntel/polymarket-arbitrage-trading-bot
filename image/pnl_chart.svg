<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="700" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="chartClip">
      <rect x="60" y="60" width="600" height="240"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="700" height="3" rx="2" fill="url(#topGrad)"/>

  <!-- Title -->
  <text x="350" y="36" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#e6edf3" text-anchor="middle" filter="url(#glow)">PAPER TRADING P&amp;L CURVE</text>
  <text x="350" y="53" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">Balance over time · Starting: $1000 USDC</text>

  <!-- Chart area -->
  <rect x="60" y="65" width="600" height="240" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="60" y1="185" x2="660" y2="185" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="125" x2="660" y2="125" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="245" x2="660" y2="245" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="210" y1="65" x2="210" y2="305" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="360" y1="65" x2="360" y2="305" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="510" y1="65" x2="510" y2="305" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Zero line (baseline = $1000) -->
  <line x1="60" y1="185" x2="660" y2="185" stroke="#374151" stroke-width="1.5"/>
  <text x="45" y="189" font-family="'Courier New', monospace" font-size="9" fill="#8b949e" text-anchor="end">$1000</text>
  <text x="45" y="129" font-family="'Courier New', monospace" font-size="9" fill="#8b949e" text-anchor="end">$1050</text>
  <text x="45" y="249" font-family="'Courier New', monospace" font-size="9" fill="#8b949e" text-anchor="end">$950</text>

  <!-- Simulated P&L line (realistic curve for DH strategy: gradual growth with small dips) -->
  <!-- Area fill (positive) -->
  <polygon
    points="60,185 90,183 110,180 140,176 160,174 185,170 200,168 215,165 240,162 260,159 280,158 300,155 320,152 340,150 360,148 380,150 400,146 420,143 440,141 460,139 475,138 490,136 505,133 520,131 535,130 550,128 565,126 580,125 595,124 610,122 625,120 640,118 660,116  660,185 60,185"
    fill="url(#greenGrad)" clip-path="url(#chartClip)"/>

  <!-- P&L Line -->
  <polyline
    points="60,185 90,183 110,180 140,176 160,174 185,170 200,168 215,165 225,168 240,162 260,159 280,158 290,161 300,155 320,152 340,150 355,153 360,148 380,150 390,147 400,146 420,143 440,141 450,143 460,139 475,138 490,136 505,133 520,131 535,130 550,128 565,126 580,125 595,124 610,122 625,120 640,118 660,116"
    fill="none" stroke="#34d399" stroke-width="2.5" clip-path="url(#chartClip)" filter="url(#glow)"/>

  <!-- Trade dots -->
  <circle cx="90" cy="183" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="140" cy="176" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="200" cy="168" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="225" cy="168" r="3" fill="#ef4444" opacity="0.8"/>
  <circle cx="240" cy="162" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="290" cy="161" r="3" fill="#ef4444" opacity="0.8"/>
  <circle cx="340" cy="150" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="355" cy="153" r="3" fill="#ef4444" opacity="0.8"/>
  <circle cx="400" cy="146" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="450" cy="143" r="3" fill="#f59e0b" opacity="0.8"/>
  <circle cx="520" cy="131" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="580" cy="125" r="3" fill="#34d399" opacity="0.8"/>
  <circle cx="640" cy="118" r="3" fill="#34d399" opacity="0.8"/>

  <!-- Current price indicator -->
  <line x1="660" y1="116" x2="660" y2="65" stroke="#34d399" stroke-width="1" stroke-dasharray="3,3"/>
  <rect x="630" y="66" width="65" height="20" rx="3" fill="#1a2a1a" stroke="#34d399" stroke-width="1"/>
  <text x="662" y="80" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#34d399" text-anchor="middle">$1058.20</text>

  <!-- X-axis labels -->
  <text x="60" y="322" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">0</text>
  <text x="210" y="322" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">trade 5</text>
  <text x="360" y="322" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">trade 10</text>
  <text x="510" y="322" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">trade 15</text>
  <text x="660" y="322" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">trade 20</text>

  <!-- Stats row -->
  <rect x="30" y="335" width="640" height="30" rx="6" fill="#111827" stroke="#30363d" stroke-width="1"/>

  <text x="70" y="355" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">Win Rate</text>
  <text x="70" y="355" dy="0" dx="50" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#34d399">76.9%</text>

  <text x="220" y="355" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">Total PnL</text>
  <text x="220" y="355" dy="0" dx="55" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#34d399">+$58.20</text>

  <text x="400" y="355" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">Avg Trade</text>
  <text x="400" y="355" dy="0" dx="55" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#34d399">+$2.91</text>

  <text x="570" y="355" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">Max DD</text>
  <text x="570" y="355" dy="0" dx="45" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#f59e0b">-$4.10</text>

  <!-- Legend -->
  <circle cx="48" cy="355" r="4" fill="#34d399" opacity="0.8"/>
  <text x="55" y="359" font-family="'Courier New', monospace" font-size="9" fill="#34d399">WIN</text>
  <circle cx="160" cy="355" r="4" fill="#ef4444" opacity="0.8"/>
  <text x="167" y="359" font-family="'Courier New', monospace" font-size="9" fill="#ef4444">LOSS</text>
  <circle cx="340" cy="355" r="4" fill="#f59e0b" opacity="0.8"/>
  <text x="347" y="359" font-family="'Courier New', monospace" font-size="9" fill="#f59e0b">TIE/FEE</text>

  <!-- Bottom border -->
  <rect x="0" y="377" width="700" height="3" rx="2" fill="url(#topGrad)"/>
</svg>
