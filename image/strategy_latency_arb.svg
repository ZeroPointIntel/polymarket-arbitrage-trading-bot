<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" width="780" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099bb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="480" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="780" height="3" rx="2" fill="url(#cyanGrad)"/>

  <!-- Title -->
  <text x="390" y="36" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#00d4ff" text-anchor="middle" filter="url(#glow)">LATENCY ARB STRATEGY</text>
  <text x="390" y="56" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">Exploit ~2.7s lag: Binance price moves → Polymarket hasn't updated yet</text>

  <!-- BINANCE source -->
  <rect x="30" y="90" width="140" height="90" rx="8" fill="#1a1f2e" stroke="#f59e0b" stroke-width="2"/>
  <text x="100" y="115" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#f59e0b" text-anchor="middle">BINANCE</text>
  <text x="100" y="133" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">WebSocket</text>
  <text x="100" y="150" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">real-time price</text>
  <text x="100" y="168" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b" text-anchor="middle">t = 0ms</text>

  <!-- Arrow Binance → EdgeDetector -->
  <line x1="170" y1="135" x2="220" y2="135" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="195" y="128" font-family="'Courier New', monospace" font-size="9" fill="#f59e0b" text-anchor="middle">live feed</text>

  <!-- EDGE DETECTOR -->
  <rect x="220" y="90" width="160" height="90" rx="8" fill="#1f2937" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="300" y="113" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#00d4ff" text-anchor="middle">EDGE DETECTOR</text>
  <text x="300" y="130" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">sigmoid(price_delta)</text>
  <text x="300" y="146" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">fair_value vs</text>
  <text x="300" y="162" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">polymarket_price</text>

  <!-- Arrow EdgeDetector → Signal Check -->
  <line x1="380" y1="135" x2="430" y2="135" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SIGNAL CHECK -->
  <rect x="430" y="90" width="160" height="90" rx="8" fill="#1f2937" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="510" y="113" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#00d4ff" text-anchor="middle">SIGNAL CHECK</text>
  <text x="510" y="130" font-family="'Courier New', monospace" font-size="10" fill="#34d399" text-anchor="middle">edge &gt; 5% ?</text>
  <text x="510" y="146" font-family="'Courier New', monospace" font-size="10" fill="#34d399" text-anchor="middle">conviction &gt; 55% ?</text>
  <text x="510" y="162" font-family="'Courier New', monospace" font-size="10" fill="#34d399" text-anchor="middle">entry zone ok ?</text>

  <!-- Arrow Signal → Enter -->
  <line x1="590" y1="135" x2="640" y2="135" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="615" y="128" font-family="'Courier New', monospace" font-size="9" fill="#34d399" text-anchor="middle">fire</text>

  <!-- ENTER -->
  <rect x="640" y="90" width="110" height="90" rx="8" fill="#1a2a1a" stroke="#34d399" stroke-width="2"/>
  <text x="695" y="115" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">ENTER</text>
  <text x="695" y="133" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">BUY YES or</text>
  <text x="695" y="149" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">BUY NO</text>
  <text x="695" y="167" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">CLOB order</text>

  <!-- POLYMARKET source (lag visual) -->
  <rect x="30" y="220" width="140" height="90" rx="8" fill="#1a1a2e" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="100" y="245" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#6b7280" text-anchor="middle">POLYMARKET</text>
  <text x="100" y="263" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">REST polling</text>
  <text x="100" y="280" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">stale price</text>
  <text x="100" y="298" font-family="'Courier New', monospace" font-size="10" fill="#ef4444" text-anchor="middle">t ≈ +2.7s lag</text>

  <!-- Lag arrow visual -->
  <line x1="100" y1="180" x2="100" y2="220" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="115" y="205" font-family="'Courier New', monospace" font-size="9" fill="#ef4444">~2.7s lag</text>

  <!-- Timing diagram -->
  <rect x="200" y="210" width="550" height="120" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="475" y="232" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">TIMING DIAGRAM</text>

  <!-- Timeline -->
  <line x1="220" y1="280" x2="730" y2="280" stroke="#374151" stroke-width="2"/>
  <!-- Time markers -->
  <line x1="240" y1="274" x2="240" y2="286" stroke="#8b949e" stroke-width="1.5"/>
  <text x="240" y="298" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">t=0</text>
  <line x1="400" y1="274" x2="400" y2="286" stroke="#8b949e" stroke-width="1.5"/>
  <text x="400" y="298" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">t=1s</text>
  <line x1="560" y1="274" x2="560" y2="286" stroke="#8b949e" stroke-width="1.5"/>
  <text x="560" y="298" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">t=2s</text>
  <line x1="680" y1="274" x2="680" y2="286" stroke="#f59e0b" stroke-width="2"/>
  <text x="680" y="298" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b" text-anchor="middle">t=2.7s</text>

  <!-- Binance event -->
  <circle cx="240" cy="255" r="5" fill="#f59e0b"/>
  <text x="240" y="248" font-family="'Courier New', monospace" font-size="9" fill="#f59e0b" text-anchor="middle">BTC +$50</text>

  <!-- Our trade -->
  <circle cx="290" cy="265" r="4" fill="#00d4ff"/>
  <text x="290" y="258" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" text-anchor="middle">BUY YES</text>
  <text x="290" y="248" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">+0.2s</text>

  <!-- PM update (late) -->
  <circle cx="680" cy="255" r="5" fill="#6b7280"/>
  <text x="680" y="248" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">PM updates</text>
  <text x="680" y="238" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">price →0.64</text>

  <!-- Our edge zone -->
  <rect x="240" y="260" width="440" height="12" rx="3" fill="#00d4ff" opacity="0.1"/>
  <text x="460" y="322" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" text-anchor="middle">← edge window: ~2.5s to capture →</text>

  <!-- Exit conditions -->
  <rect x="30" y="360" width="720" height="90" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="390" y="382" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">EXIT CONDITIONS</text>

  <rect x="50" y="392" width="155" height="42" rx="5" fill="#1f2937" stroke="#34d399" stroke-width="1"/>
  <text x="127" y="409" font-family="'Courier New', monospace" font-size="10" fill="#34d399" text-anchor="middle">Take Profit Price</text>
  <text x="127" y="426" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">default: 0.68</text>

  <rect x="215" y="392" width="155" height="42" rx="5" fill="#1f2937" stroke="#34d399" stroke-width="1"/>
  <text x="292" y="409" font-family="'Courier New', monospace" font-size="10" fill="#34d399" text-anchor="middle">Take Profit PnL</text>
  <text x="292" y="426" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">+32% unrealised</text>

  <rect x="380" y="392" width="155" height="42" rx="5" fill="#1f2937" stroke="#ef4444" stroke-width="1"/>
  <text x="457" y="409" font-family="'Courier New', monospace" font-size="10" fill="#ef4444" text-anchor="middle">Stop Loss PnL</text>
  <text x="457" y="426" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">-20% unrealised</text>

  <rect x="545" y="392" width="185" height="42" rx="5" fill="#1f2937" stroke="#f59e0b" stroke-width="1"/>
  <text x="637" y="409" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b" text-anchor="middle">Position Timeout</text>
  <text x="637" y="426" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">300s (5-min window)</text>

  <!-- Bottom border -->
  <rect x="0" y="477" width="780" height="3" rx="2" fill="url(#cyanGrad)"/>
</svg>
