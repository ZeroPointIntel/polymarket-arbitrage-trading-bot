<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 500" width="780" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="500" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="780" height="3" rx="2" fill="url(#purpleGrad)"/>

  <!-- Title -->
  <text x="390" y="36" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#a78bfa" text-anchor="middle" filter="url(#glow)">DUMP HEDGE STRATEGY</text>
  <text x="390" y="56" font-family="'Courier New', monospace" font-size="11" fill="#8b949e" text-anchor="middle">Structural arbitrage: buy YES + NO when combined price &lt; $1.00</text>

  <!-- STEP 1: Market Scan -->
  <rect x="30" y="80" width="160" height="80" rx="8" fill="#1f2937" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="110" y="105" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#a78bfa" text-anchor="middle">MARKET SCAN</text>
  <text x="110" y="122" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">Poll YES + NO</text>
  <text x="110" y="137" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">ask prices</text>
  <text x="110" y="152" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">every 2s</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="120" x2="240" y2="120" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 2: Check Combined -->
  <rect x="240" y="80" width="160" height="80" rx="8" fill="#1f2937" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="320" y="105" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#a78bfa" text-anchor="middle">CHECK SUM</text>
  <text x="320" y="122" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">YES_ask + NO_ask</text>
  <text x="320" y="137" font-family="'Courier New', monospace" font-size="10" fill="#34d399" text-anchor="middle">&lt; DH_SUM_TARGET?</text>
  <text x="320" y="152" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">(default 0.97)</text>

  <!-- Arrow 2→3 YES -->
  <line x1="400" y1="120" x2="450" y2="120" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="425" y="113" font-family="'Courier New', monospace" font-size="10" fill="#34d399" text-anchor="middle">YES</text>

  <!-- Arrow 2 down NO -->
  <line x1="320" y1="160" x2="320" y2="210" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="335" y="190" font-family="'Courier New', monospace" font-size="10" fill="#ef4444">NO</text>
  <rect x="240" y="210" width="160" height="40" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="320" y="235" font-family="'Courier New', monospace" font-size="11" fill="#6b7280" text-anchor="middle">Skip / Cooldown</text>

  <!-- STEP 3: Size Position -->
  <rect x="450" y="80" width="160" height="80" rx="8" fill="#1f2937" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="530" y="103" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#a78bfa" text-anchor="middle">SIZE POSITION</text>
  <text x="530" y="120" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">shares = budget /</text>
  <text x="530" y="135" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">combined_price</text>
  <text x="530" y="150" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b" text-anchor="middle">min $1.00 per leg</text>

  <!-- Arrow 3→4 -->
  <line x1="610" y1="120" x2="660" y2="120" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- STEP 4: ENTER -->
  <rect x="660" y="80" width="100" height="80" rx="8" fill="#1a2a1a" stroke="#34d399" stroke-width="2"/>
  <text x="710" y="108" font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">ENTER</text>
  <text x="710" y="125" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">BUY YES</text>
  <text x="710" y="140" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">+ BUY NO</text>
  <text x="710" y="155" font-family="'Courier New', monospace" font-size="10" fill="#34d399" text-anchor="middle">simultaneously</text>

  <!-- Profit Lock illustration -->
  <rect x="30" y="290" width="720" height="170" rx="10" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="390" y="315" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#f59e0b" text-anchor="middle">LOCKED PROFIT MECHANICS</text>

  <!-- Example numbers -->
  <rect x="50" y="328" width="200" height="115" rx="8" fill="#1f2937" stroke="#7c3aed" stroke-width="1"/>
  <text x="150" y="350" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#a78bfa" text-anchor="middle">ENTRY</text>
  <text x="150" y="368" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">YES_ask = 0.42</text>
  <text x="150" y="384" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">NO_ask  = 0.55</text>
  <line x1="70" y1="393" x2="230" y2="393" stroke="#374151" stroke-width="1"/>
  <text x="150" y="408" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">combined = 0.97</text>
  <text x="150" y="424" font-family="'Courier New', monospace" font-size="11" fill="#34d399" text-anchor="middle">locked = $0.03/share</text>
  <text x="150" y="439" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">3.09% guaranteed</text>

  <!-- Arrow center -->
  <line x1="260" y1="385" x2="310" y2="385" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="285" y="378" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">resolves</text>

  <!-- Resolution outcome -->
  <rect x="310" y="328" width="200" height="115" rx="8" fill="#1f2937" stroke="#34d399" stroke-width="1"/>
  <text x="410" y="350" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#34d399" text-anchor="middle">RESOLUTION (YES wins)</text>
  <text x="410" y="368" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">YES token → $1.00</text>
  <text x="410" y="384" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">NO token  → $0.00</text>
  <line x1="330" y1="393" x2="490" y2="393" stroke="#374151" stroke-width="1"/>
  <text x="410" y="408" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">collect = $1.00/share</text>
  <text x="410" y="424" font-family="'Courier New', monospace" font-size="11" fill="#34d399" text-anchor="middle">profit = $0.03/share</text>
  <text x="410" y="439" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">regardless of direction</text>

  <!-- Arrow 2 -->
  <line x1="520" y1="385" x2="570" y2="385" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="545" y="378" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">or early</text>
  <text x="545" y="390" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" text-anchor="middle">exit</text>

  <!-- Early exit box -->
  <rect x="570" y="328" width="160" height="115" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="1"/>
  <text x="650" y="350" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">EARLY EXIT</text>
  <text x="650" y="368" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">sell when</text>
  <text x="650" y="384" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">70% of locked</text>
  <text x="650" y="400" font-family="'Courier New', monospace" font-size="10" fill="#8b949e" text-anchor="middle">profit realised</text>
  <text x="650" y="420" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b" text-anchor="middle">or timeout</text>
  <text x="650" y="436" font-family="'Courier New', monospace" font-size="10" fill="#6b7280" text-anchor="middle">(90% of window)</text>

  <!-- Exit conditions label -->
  <rect x="30" y="200" width="720" height="75" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="390" y="220" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">EXIT CONDITIONS</text>

  <rect x="50" y="230" width="155" height="30" rx="5" fill="#1f2937" stroke="#34d399" stroke-width="1"/>
  <text x="127" y="250" font-family="'Courier New', monospace" font-size="10" fill="#34d399" text-anchor="middle">70% profit reached</text>

  <rect x="215" y="230" width="155" height="30" rx="5" fill="#1f2937" stroke="#f59e0b" stroke-width="1"/>
  <text x="292" y="250" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b" text-anchor="middle">Window timeout (90%)</text>

  <rect x="380" y="230" width="155" height="30" rx="5" fill="#1f2937" stroke="#a78bfa" stroke-width="1"/>
  <text x="457" y="250" font-family="'Courier New', monospace" font-size="10" fill="#a78bfa" text-anchor="middle">Market resolved (404)</text>

  <rect x="545" y="230" width="185" height="30" rx="5" fill="#1f2937" stroke="#ef4444" stroke-width="1"/>
  <text x="637" y="250" font-family="'Courier New', monospace" font-size="10" fill="#ef4444" text-anchor="middle">Stop loss (-20% PnL)</text>

  <!-- Bottom border -->
  <rect x="0" y="497" width="780" height="3" rx="2" fill="url(#purpleGrad)"/>
</svg>
