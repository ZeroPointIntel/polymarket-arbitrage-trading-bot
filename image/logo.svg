<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" rx="12" fill="url(#bgGrad)" />

  <!-- Top accent line -->
  <rect x="0" y="0" width="600" height="3" rx="2" fill="url(#accentGrad)" />

  <!-- Claw icon -->
  <g transform="translate(48, 100)" filter="url(#glow)">
    <!-- Claw prongs -->
    <path d="M0,-40 C-4,-20 -14,0 -18,20 C-16,22 -12,22 -10,20 C-8,5 0,-12 0,-12" fill="#00d4ff" opacity="0.9"/>
    <path d="M0,-40 C0,-18 0,0 0,22 C4,23 6,21 6,19 C4,4 4,-14 4,-14" fill="#00d4ff" opacity="0.9"/>
    <path d="M0,-40 C4,-20 14,0 18,20 C16,22 12,22 10,20 C8,5 0,-12 0,-12" fill="#00d4ff" opacity="0.9"/>
    <!-- Palm -->
    <ellipse cx="0" cy="-40" rx="10" ry="6" fill="#00d4ff" opacity="0.95"/>
    <!-- Arm -->
    <rect x="-4" y="-65" width="8" height="28" rx="4" fill="#0099bb" opacity="0.9"/>
  </g>

  <!-- Bot name -->
  <text x="100" y="85" font-family="'Courier New', monospace" font-size="36" font-weight="bold" fill="url(#accentGrad)" filter="url(#glow)">OPENCLAW</text>

  <!-- Subtitle -->
  <text x="100" y="115" font-family="'Courier New', monospace" font-size="14" fill="#8b949e" letter-spacing="4">POLYMARKET ARB BOT</text>

  <!-- Strategy tags -->
  <rect x="100" y="130" width="110" height="24" rx="4" fill="#1f2937" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
  <text x="155" y="147" font-family="'Courier New', monospace" font-size="11" fill="#00d4ff" text-anchor="middle">LATENCY ARB</text>

  <rect x="220" y="130" width="120" height="24" rx="4" fill="#1f2937" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
  <text x="280" y="147" font-family="'Courier New', monospace" font-size="11" fill="#a78bfa" text-anchor="middle">DUMP HEDGE</text>

  <rect x="350" y="130" width="90" height="24" rx="4" fill="#1f2937" stroke="#34d399" stroke-width="1" opacity="0.8"/>
  <text x="395" y="147" font-family="'Courier New', monospace" font-size="11" fill="#34d399" text-anchor="middle">POLYGON</text>

  <!-- Version tag -->
  <text x="580" y="185" font-family="'Courier New', monospace" font-size="10" fill="#30363d" text-anchor="end">v2.0 · 2025</text>

  <!-- Bottom border -->
  <rect x="0" y="197" width="600" height="3" rx="2" fill="url(#accentGrad)" />
</svg>
